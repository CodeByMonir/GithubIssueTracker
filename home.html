<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Log In</title>
    
    <!-- font awesome -->
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Tailwind and Daisyui -->
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- google fonts -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen">

    <header class="px-[60px] flex items-center justify-between p-4 bg-white">
        <div class="logo flex items-center gap-1">
            <img class="h-9 w-9" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
        </div>
        <div class="searchbar flex items-center gap-6">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </header>

    <main class="max-w-[1110px] mx-auto mt-[60px] bg-white">
        <div class="top p-6 gap-1">
            <div class="h-10 w-[120px] btn btn-primary">All</div>
            <div class="h-10 w-[120px] btn">Open</div>
            <div class="h-10 w-[120px] btn">Closed</div>
        </div>

        <section>
            <div class="top px-6 py-4 flex items-center justify-between border-2 border-[#F8FAFC]">
                <div class="left flex gap-2">
                    <div class="h-[50px] w-[50px] flex items-center justify-center bg-[#ECE4FF] rounded-full"><img src="./assets/Aperture.png" alt=""></div>
                    <div>
                        <h4 class="font-semibold text-[#1F2937] text-[20px]"><span>50</span> Issues</h4>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="right flex gap-4">
                    <div class="flex items-center gap-2">
                        <div class="bg-[#00A96E] h-[12px] w-[12px] rounded-full"></div>
                        <p class="font-medium text-[#1F2937]"> Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="bg-[#A855F7] h-[12px] w-[12px] rounded-full"></div>
                        <p class="font-medium text-[#1F2937]">Closed</p>
                    </div>
                </div>
            </div>

            <main id="main-sec" class="p-6 border-2 border-[#F8FAFC]">

            </main>

        </section>
    </main>


    <script src="./api.js"></script>
</body>
</html>
